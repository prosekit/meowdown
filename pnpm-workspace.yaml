ignoreWorkspaceRootCheck: true

packages:
  - website
  - packages/*

dedupePeers: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - '@ocavue/eslint-config'
  - '@prosekit/*'

# Enable "blockExoticSubdeps" and "overrides" to install packages from pkg.pr.new
blockExoticSubdeps: false
overrides:
  '@prosekit/pm': https://pkg.pr.new/@prosekit/pm@3a887f4
  '@prosekit/react': https://pkg.pr.new/@prosekit/react@3a887f4
  '@prosekit/core': https://pkg.pr.new/@prosekit/core@3a887f4
  '@prosekit/extensions': https://pkg.pr.new/@prosekit/extensions@3a887f4
  '@prosekit/web': https://pkg.pr.new/@prosekit/web@3a887f4
