ignoreWorkspaceRootCheck: true

packages:
  - website
  - packages/*

dedupePeers: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - '@ocavue/eslint-config'
  - '@prosekit/*'
  - '@aria-ui/*'
  - prosemirror-view@1.42.0
  - prosemirror-splittable@1.1.0
  - prosemirror-flat-list@0.7.0

allowBuilds:
  simple-git-hooks: false

overrides:
  prosemirror-view: ^1.42.0

patchedDependencies:
  prosemirror-view: patches/prosemirror-view.patch

# Enable "blockExoticSubdeps" and "overrides" to install packages from pkg.pr.new
# blockExoticSubdeps: false
# overrides:
#   '@prosekit/pm': https://pkg.pr.new/@prosekit/pm@3a887f44acdb0814111680d013245557ead5ba57
