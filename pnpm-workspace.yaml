ignoreWorkspaceRootCheck: true

packages:
  - website
  - packages/*

dedupePeers: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 10080 # 7 days

trustLockfile: true

minimumReleaseAgeExclude:
  - '@ocavue/eslint-config'
  - '@prosekit/*'
  - '@aria-ui/*'
  - eslint-plugin-unicorn@71.0.0
  - prosemirror-flat-list@0.7.1
  - prosemirror-view

allowBuilds:
  simple-git-hooks: false

# "blockExoticSubdeps" and "overrides" install packages from pkg.pr.new
# blockExoticSubdeps: false
# overrides:
#   '@prosekit/pm': https://pkg.pr.new/@prosekit/pm@7b1d474b13916ed1a34d54a2c9339a95d0c9be6f
#   '@prosekit/react': https://pkg.pr.new/@prosekit/react@7b1d474b13916ed1a34d54a2c9339a95d0c9be6f
#   '@prosekit/core': https://pkg.pr.new/@prosekit/core@7b1d474b13916ed1a34d54a2c9339a95d0c9be6f
#   '@prosekit/extensions': https://pkg.pr.new/@prosekit/extensions@7b1d474b13916ed1a34d54a2c9339a95d0c9be6f
#   '@prosekit/web': https://pkg.pr.new/@prosekit/web@7b1d474b13916ed1a34d54a2c9339a95d0c9be6f
