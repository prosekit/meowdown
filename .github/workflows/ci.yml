name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

  test:
    runs-on: ${{ matrix.runner }}
    name: test-${{ matrix.os }}-${{ matrix.browser }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            browser: chromium
            coverage: true
          - os: linux
            runner: ubuntu-latest
            browser: firefox
          - os: mac
            runner: macos-latest
            browser: chromium
          - os: mac
            runner: macos-latest
            browser: webkit
          - os: windows
            runner: windows-latest
            browser: chromium

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Install
        run: pnpm run test:install:${{ matrix.browser }}

      - name: Check macOS config 1
        if: ${{ matrix.os == 'mac' }}
        run: |
          # Disable automatic capitalization as it’s annoying when typing code
          defaults read -g NSAutomaticCapitalizationEnabled || echo "NSAutomaticCapitalizationEnabled not set"

          # Disable smart dashes as they’re annoying when typing code
          defaults read -g NSAutomaticDashSubstitutionEnabled || echo "NSAutomaticDashSubstitutionEnabled not set"

          # Disable automatic period substitution as it’s annoying when typing code
          defaults read -g NSAutomaticPeriodSubstitutionEnabled || echo "NSAutomaticPeriodSubstitutionEnabled not set"

          # Disable smart quotes as they’re annoying when typing code
          defaults read -g NSAutomaticQuoteSubstitutionEnabled || echo "NSAutomaticQuoteSubstitutionEnabled not set"

          # Disable auto-correct
          defaults read -g NSAutomaticSpellingCorrectionEnabled || echo "NSAutomaticSpellingCorrectionEnabled not set"

      - name: Check macOS config 2
        if: ${{ matrix.os == 'mac' }}
        run: |
          # Disable automatic capitalization as it’s annoying when typing code
          defaults read NSGlobalDomain NSAutomaticCapitalizationEnabled || echo "NSAutomaticCapitalizationEnabled not set"

          # Disable smart dashes as they’re annoying when typing code
          defaults read NSGlobalDomain NSAutomaticDashSubstitutionEnabled || echo "NSAutomaticDashSubstitutionEnabled not set"

          # Disable automatic period substitution as it’s annoying when typing code
          defaults read NSGlobalDomain NSAutomaticPeriodSubstitutionEnabled || echo "NSAutomaticPeriodSubstitutionEnabled not set"

          # Disable smart quotes as they’re annoying when typing code
          defaults read NSGlobalDomain NSAutomaticQuoteSubstitutionEnabled || echo "NSAutomaticQuoteSubstitutionEnabled not set"

          # Disable auto-correct
          defaults read NSGlobalDomain NSAutomaticSpellingCorrectionEnabled || echo "NSAutomaticSpellingCorrectionEnabled not set"

      - name: Check macOS config
        if: ${{ matrix.os == 'mac' }}
        run: |
          # Disable automatic capitalization as it’s annoying when typing code
          defaults write NSGlobalDomain NSAutomaticCapitalizationEnabled -bool true

          # Disable smart dashes as they’re annoying when typing code
          defaults write NSGlobalDomain NSAutomaticDashSubstitutionEnabled -bool true

          # Disable automatic period substitution as it’s annoying when typing code
          defaults write NSGlobalDomain NSAutomaticPeriodSubstitutionEnabled -bool true

          # Disable smart quotes as they’re annoying when typing code
          defaults write NSGlobalDomain NSAutomaticQuoteSubstitutionEnabled -bool true

          # Disable auto-correct
          defaults write NSGlobalDomain NSAutomaticSpellingCorrectionEnabled -bool true

      - name: Check macOS config 3
        if: ${{ matrix.os == 'mac' }}
        run: |
          # Disable automatic capitalization as it’s annoying when typing code
          defaults read -g NSAutomaticCapitalizationEnabled || echo "NSAutomaticCapitalizationEnabled not set"

          # Disable smart dashes as they’re annoying when typing code
          defaults read -g NSAutomaticDashSubstitutionEnabled || echo "NSAutomaticDashSubstitutionEnabled not set"

          # Disable automatic period substitution as it’s annoying when typing code
          defaults read -g NSAutomaticPeriodSubstitutionEnabled || echo "NSAutomaticPeriodSubstitutionEnabled not set"

          # Disable smart quotes as they’re annoying when typing code
          defaults read -g NSAutomaticQuoteSubstitutionEnabled || echo "NSAutomaticQuoteSubstitutionEnabled not set"

          # Disable auto-correct
          defaults read -g NSAutomaticSpellingCorrectionEnabled || echo "NSAutomaticSpellingCorrectionEnabled not set"

      - name: Check macOS config 4
        if: ${{ matrix.os == 'mac' }}
        run: |
          # Disable automatic capitalization as it’s annoying when typing code
          defaults read NSGlobalDomain NSAutomaticCapitalizationEnabled || echo "NSAutomaticCapitalizationEnabled not set"

          # Disable smart dashes as they’re annoying when typing code
          defaults read NSGlobalDomain NSAutomaticDashSubstitutionEnabled || echo "NSAutomaticDashSubstitutionEnabled not set"

          # Disable automatic period substitution as it’s annoying when typing code
          defaults read NSGlobalDomain NSAutomaticPeriodSubstitutionEnabled || echo "NSAutomaticPeriodSubstitutionEnabled not set"

          # Disable smart quotes as they’re annoying when typing code
          defaults read NSGlobalDomain NSAutomaticQuoteSubstitutionEnabled || echo "NSAutomaticQuoteSubstitutionEnabled not set"

          # Disable auto-correct
          defaults read NSGlobalDomain NSAutomaticSpellingCorrectionEnabled || echo "NSAutomaticSpellingCorrectionEnabled not set"

      - name: Test
        run: pnpm run test
        env:
          MEOWDOWN_TEST_BROWSER: ${{ matrix.browser }}
          MEOWDOWN_TEST_COVERAGE: ${{ matrix.coverage && 'true' || '' }}

      - name: Report Coverage
        if: ${{ matrix.coverage }}
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1

  publish-snapshot:
    runs-on: ubuntu-latest

    needs: [build]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

      - name: Publish snapshot packages
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          max_attempts=8
          base_sleep=10
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Attempt ${attempt} to publish snapshot packages..."
            if pnpm run ci:publish:snapshot; then
              echo "Publish snapshot packages succeeded"
              break
            elif [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Publish snapshot packages failed"
              exit 1
            fi
            sleep_duration=$((base_sleep * attempt))
            echo "Sleeping ${sleep_duration}s before retry..."
            sleep "${sleep_duration}"
          done
