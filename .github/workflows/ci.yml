name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

  test:
    runs-on: ${{ matrix.runner }}
    name: test-${{ matrix.os }}-${{ matrix.browser }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            browser: chromium
            coverage: true
          - os: linux
            runner: ubuntu-latest
            browser: firefox
          - os: mac
            runner: macos-latest
            browser: chromium
          - os: mac
            runner: macos-latest
            browser: webkit
          - os: windows
            runner: windows-latest
            browser: chromium

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Install
        run: pnpm run test:install:${{ matrix.browser }}

      - name: Test
        run: pnpm run test
        env:
          MEOWDOWN_TEST_BROWSER: ${{ matrix.browser }}
          MEOWDOWN_TEST_COVERAGE: ${{ matrix.coverage && 'true' || '' }}

      - name: Report Coverage
        if: ${{ matrix.coverage }}
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1

  # Reproduces the macOS WebKit smart-dash bug that the Playwright based browser
  # tests cannot see. Playwright drives WebKit through the automation session,
  # which never runs the WebContent editor's text substitution. This job drives
  # the system WebKit (same engine as Safari) through a real WKWebView with
  # synthesized AppKit key events, so typing "--" is substituted with an em dash
  # exactly as it is in Safari. The step fails (red) while the bug is present.
  webkit-dash:
    runs-on: macos-latest
    name: reproduce-webkit-smart-dash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Reproduce smart-dash substitution in system WebKit
        run: |
          # WebKit's TextChecker falls back to this global setting, so enabling
          # it makes system WebKit substitute "--" with an em dash on typing.
          defaults write -g NSAutomaticDashSubstitutionEnabled -bool true

          pnpm dev > /tmp/meowdown-dev.log 2>&1 &
          dev_pid=$!

          ready=""
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:5173/ >/dev/null 2>&1; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then
            echo "dev server did not start"
            cat /tmp/meowdown-dev.log
            kill "$dev_pid" 2>/dev/null || true
            exit 1
          fi

          repro_status=0
          swift test/webkit-dash/repro.swift http://localhost:5173/ || repro_status=$?
          kill "$dev_pid" 2>/dev/null || true
          exit "$repro_status"

  publish-snapshot:
    runs-on: ubuntu-latest

    needs: [build]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

      - name: Publish snapshot packages
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          max_attempts=8
          base_sleep=10
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Attempt ${attempt} to publish snapshot packages..."
            if pnpm run ci:publish:snapshot; then
              echo "Publish snapshot packages succeeded"
              break
            elif [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Publish snapshot packages failed"
              exit 1
            fi
            sleep_duration=$((base_sleep * attempt))
            echo "Sleeping ${sleep_duration}s before retry..."
            sleep "${sleep_duration}"
          done
