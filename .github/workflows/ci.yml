name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

  test:
    runs-on: ${{ matrix.config.runner }}
    name: test-${{ matrix.config.os }}-${{ matrix.config.browser }} (${{ matrix.shard_index }}/${{ matrix.shard_total }})
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        config:
          - os: linux
            runner: ubuntu-latest
            browser: chromium
            coverage: true
          - os: linux
            runner: ubuntu-latest
            browser: firefox
          - os: mac
            runner: macos-latest
            browser: chromium
          - os: mac
            runner: macos-latest
            browser: webkit
          - os: windows
            runner: windows-latest
            browser: chromium
        shard_index: [1, 2]
        shard_total: [2]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Install
        run: pnpm run test:install:${{ matrix.config.browser }}

      - name: Test
        run: pnpm run test --shard=${{ matrix.shard_index }}/${{ matrix.shard_total }}
        env:
          MEOWDOWN_TEST_BROWSER: ${{ matrix.config.browser }}
          MEOWDOWN_TEST_COVERAGE: ${{ matrix.config.coverage && 'true' || '' }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() && matrix.config.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: blob-report-${{ matrix.config.os }}-${{ matrix.config.browser }}-${{ matrix.shard_index }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: blob-report-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge blob reports
        run: pnpm run test:merge-coverage

      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@8b157684c6a6b259b97d45e72b44242865c0f6a5 # v2.12.2

  publish-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs: [build]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build

      - name: Publish snapshot packages
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          max_attempts=8
          base_sleep=10
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Attempt ${attempt} to publish snapshot packages..."
            if pnpm run ci:publish:snapshot; then
              echo "Publish snapshot packages succeeded"
              break
            elif [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "Publish snapshot packages failed"
              exit 1
            fi
            sleep_duration=$((base_sleep * attempt))
            echo "Sleeping ${sleep_duration}s before retry..."
            sleep "${sleep_duration}"
          done
